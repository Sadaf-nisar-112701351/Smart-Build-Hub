{% extends 'adminbase.html' %}

{% block admin %}
<style>
    .change-password-container {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f1f4f9;
    }

    .change-password-card {
        width: 100%;
        max-width: 450px;
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        padding: 30px 25px;
    }

    .change-password-card h3 {
        font-weight: 600;
        margin-bottom: 10px;
    }

    .change-password-card p {
        font-size: 0.95rem;
        color: #777;
        margin-bottom: 25px;
    }

    .change-password-card .btn-primary {
        background: #007bff;
        border: none;
        font-weight: 500;
        transition: background 0.3s;
    }

    .change-password-card .btn-primary:hover {
        background: #0056b3;
    }

    .form-control:focus {
        border-color: #007bff;
        box-shadow: none;
    }
</style>

<div class="change-password-container">
    <div class="change-password-card">
        <h3 class="text-center">Change Password</h3>
        <p class="text-center">Enter your new password below.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="oldpwd" class="form-label">Old Password</label>
                <input type="password" class="form-control" id="oldpwd" name="oldpwd" required>
            </div>
            <div class="mb-3">
                <label for="newpwd" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newpwd" name="newpwd" required>
            </div>
            <div class="mb-3">
                <label for="confirmpwd" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmpwd" name="confirmpwd" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Change Password</button>
                <a href="{% url 'adminlogin' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>

        {% if messages %}
        <div class="mt-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
