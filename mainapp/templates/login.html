{% extends 'base.html' %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block main %}
<!--login form-->
<div class="row  mt-5">
    <div class="col-sm-10 mx-auto  border border-warning border-5 rounded-4 shadow" style="margin-top: 13vh;">
        <div class="row m-4">
            <div class="col-sm-6">
                <div class="card h-100 border-warning  border-4 rounded-4 shadow bg-warning ">
                    <img src="{% static 'img/login.png' %}" class="d-block w-100 rounded-4" alt="..." height="100%"
                        class="rounded-4">
                </div>
            </div>
            <div class="col-sm-6">
                <h1 class="text-center">Login</h1>
                {% if messages %}
                {% for m in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{m}}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
                {% endif %}
                <form method="post" class="row g-3 mt-2 mx-auto">
                    {% csrf_token %}
                    <div class="col-md-10">
                        <label for="inputEmail4" class="form-label">Email id / User name</label>
                        <input type="email" name="username" class="form-control" id="inputEmail4" placeholder="Username">
                    </div>
                    <div class="col-md-10">
                        <label for="inputPassword4" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="inputPassword4"
                            placeholder="Password">
                    </div>
                    <p class="text-center mt-3">
                        <a href="#">Forget Password</a>
                    </p>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="Remember">
                        <label class="form-check-lebel" for="remember">Remember Me</label>
                    </div>
                    <div class="col-md-10">
                        <button type="submit" class="btn btn-warning w-100">Sign in</button>
                    </div>
                    <div class="col-md-10">
                        <button type="submit" class="btn btn-outline-warning w-100">New user? Register</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
<!--login end-->
{% endblock %}
