{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="container-fluid">


        <div class="row">
            <div class="col-sm-12 transparent p-0">
                
                <div class="blur p-0" style="background-color: rgba(0, 0, 0, 0.821); height: 100vh;">
                    <div class="col-sm-4 mx-auto my-auto">
                        
                        <!-- card start -->
                        <div class="container">
                        <div class="card cards" style="width: 30rem; height: 36rem; background-color: rgba(255, 255, 255, 0.593);">

                        <img src="{% static 'img/gaur.jpg' %}" alt="" height="150px" width="150px" class="mx-auto">

                            <div class="card-body">
                                <h4 class="card-title text-center">Welcome Admin</h4>
                                {% if messages %}
                                {% for m in messages %}
                                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                                    {{m}}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"
                                        aria-label="Close"></button>
                                </div>
                                {% endfor %}
                                {% endif %}
                            </div>
                            <form method="post" class="mt-4 ms-3 me-3">
                                {% csrf_token %}
                                <div class="form-floating mb-3">
                                    <input type="text" name="username" class="form-control" id="floatingInput"
                                        placeholder="name@example.com">
                                    <label for="floatingInput">Email address</label>
                                </div>
                                <div class="form-floating">
                                    <input type="password" name="password" class="form-control" id="floatingPassword"
                                        placeholder="Password">
                                    <label for="floatingPassword">Password</label>
                                </div>
                                <button type="submit" class="btn btn-dark mt-4 w-100"
                                    style="background-color: #161f2f;">Login</button>
                                <p class="mt-5">&copy; SBH <br /><small>Design & Developed By:<br /> ❤️Sadaf Nisar
                                    </small><a href="{% url 'index' %}" class="float-end backhome">
    Back to Home
</a></p>
                            </form>
                            </div>
                            </div>
                        </div>

                        <!-- card end -->

                    </div>
                </div>
                
            </div>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
</body>

</html>
